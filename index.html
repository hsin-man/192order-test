.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
label{font-weight:bold;font-size:14px}
input,select,textarea{

select option{

html, body, input, select, textarea, button {

select {

/* V4.8：Android 相容底部彈出選單 */
select.custom-native-hidden{

function optionHTML(list, empty="無"){
  let h = "";
  if(empty === "請選擇主食"){
    h = `<option value="REQUIRED" selected disabled>請選擇主食</option>`;
  }else{
    h = `<option value="0">${empty}</option>`;
  }
  list.forEach(o=>h+=`<option value="${o[1]}">${o[0]}${o[1]?" +$"+o[1]:""}</option>`);
  return h;
}


function getAddonOptions(item){
  const base = item && item.addonSet && optionSets[item.addonSet] ? optionSets[item.addonSet] : [];
  const extra = item && Array.isArray(item.addonExtra) ? item.addonExtra : [];
  return base.concat(extra);
}

function addonMultiHTML(list){
  const encoded = encodeURIComponent(JSON.stringify(list || []));
  return `<div class="addon-multi" data-options="${encoded}" data-selected=""><button type="button" class="addon-multi-btn" onclick="openAddonSheet(this)">無</button></div>`;
}

function getAddonSelections(box){
  if(!box) return [];
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  const selected = String(box.dataset.selected || '').split(',').filter(x=>x !== '').map(Number);
  return selected.map(i=>options[i]).filter(Boolean);
}

function getAddonTotal(box){
  return getAddonSelections(box).reduce((sum,o)=>sum + Number(o[1] || 0), 0);
}

function getAddonText(box){
  const selected = getAddonSelections(box);
  if(!selected.length) return '';
  return selected.map(o => `${o[0]}${Number(o[1] || 0) ? ' +$' + o[1] : ''}`).join('、');
}

function getAddonTotalFromRow(row){
  const multi = row.querySelector('.addon-multi');
  if(multi) return getAddonTotal(multi);
  const sel = row.querySelector('.addon');
  return sel ? Number(sel.value || 0) : 0;
}

function getAddonTextFromRow(row){
  const multi = row.querySelector('.addon-multi');
  if(multi) return getAddonText(multi);
  const sel = row.querySelector('.addon');
  if(!sel || Number(sel.value || 0) === 0) return '';
  const opt = sel.options[sel.selectedIndex];
  return opt ? opt.text : '';
}

function shortCategoryName(name){
  return String(name || "").replace(" : 凡點主食即可加購","").trim();
}

function renderCategoryNav(){
  const nav = document.getElementById("categoryNav");
  if(!nav) return;
  nav.innerHTML = "";
  categories.forEach((cat,ci)=>{
    const hasVisible = cat.items.some(item => !item.hidden);
    if(!hasVisible) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = "🛵 " + shortCategoryName(cat.name);
    btn.onclick = () => scrollToCategory(ci);
    nav.appendChild(btn);
  });
}

function scrollToCategory(ci){
  const el = document.getElementById(`cat-${ci}`);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderMenu(){
  const menu=document.getElementById("menu"); 
  menu.innerHTML="";
  categories.forEach((cat,ci)=>{
    let html=`<div class="category" id="cat-${ci}"><div class="category-title">${cat.name}${cat.hint?`<span class="hint">(${cat.hint})</span>`:""}</div>`;
    cat.items.forEach((item,ii)=>{
      if(item.hidden) return;

      const soldOut = item.soldOut === true;
      const cardClass = soldOut ? "item-card soldout" : "item-card";
      const badge = soldOut ? `<span class="soldout-badge">售完</span>` : "";

      html+=`<div class="${cardClass}" data-ci="${ci}" data-ii="${ii}">
        <div class="item-head"><div class="item-name">${item.name}${badge}</div><div class="price">$${item.price}</div></div>`;

      if(cat.mode==="direct"){
        html+=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" ${soldOut?"disabled":""} onclick="changeDirectQty(${ci},${ii},-1)">-</button><input class="qty direct-qty" id="direct-${ci}-${ii}" value="0" type="number" min="0" ${soldOut?"disabled":""} oninput="calculate()"><button class="qtybtn" ${soldOut?"disabled":""} onclick="changeDirectQty(${ci},${ii},1)">+</button></div></div>
        <div class="row"><label>備註</label><input class="direct-remark" id="direct-remark-${ci}-${ii}" placeholder="備註" ${soldOut?"disabled":""}></div>
        <div class="subtotal" id="direct-sub-${ci}-${ii}">$0</div>${soldOut?`<div class="status-note">此品項今日售完</div>`:""}`;
      }else{
        html+=`<div id="lines-${ci}-${ii}"></div><button class="add" ${soldOut?"disabled":""} onclick="addLine(${ci},${ii})">${soldOut?"售完":"新增一筆"}</button>${soldOut?`<div class="status-note">此品項今日售完</div>`:""}`;
      }

      html+=`</div>`;
    });
    html+=`</div>`;
    menu.innerHTML+=html;
  });
  renderCategoryNav();
  enhanceSelects(menu);
}
function changeDirectQty(ci,ii,delta){
  const el=document.getElementById(`direct-${ci}-${ii}`);
  if(!el || el.disabled) return;
  el.value=Math.max(0,Number(el.value||0)+delta);
  calculate();
}
function addLine(ci,ii){
  const cat=categories[ci], item=cat.items[ii];
  if(item.soldOut){ alert("此品項今日售完。"); return; }
  const box=document.getElementById(`lines-${ci}-${ii}`);
  const id=`line-${ci}-${ii}-${Date.now()}-${Math.floor(Math.random()*1000)}`;
  const hasMain=item.mainSet||cat.mainSet;
  const main = hasMain ? `<div class="row"><label>主食</label><select class="mainfood" onchange="calculate()">${optionHTML(mainSets[item.mainSet||cat.mainSet],"請選擇主食")}</select></div>` : "";
  const addonOptions = getAddonOptions(item);
  const isComboAddon = String(cat.name || '').includes('套餐');
  const addon = addonOptions.length
    ? (isComboAddon
        ? `<div class="row"><label>${cat.addonTitle||"換購飲料"}</label><select class="addon" onchange="calculate()">${optionHTML(addonOptions,"無")}</select></div>`
        : `<div class="row"><label>${cat.addonTitle||"加購"}</label>${addonMultiHTML(addonOptions)}</div>`)
    : "";
  const div=document.createElement("div");
  div.className="line-card";
  div.dataset.cat=cat.name; div.dataset.name=item.name; div.dataset.price=item.price;
  div.innerHTML=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" onclick="changeLineQty('${id}',-1)">-</button><input class="qty" id="${id}" value="1" type="number" min="1" oninput="calculate()"><button class="qtybtn" onclick="changeLineQty('${id}',1)">+</button></div></div>
  ${main}${addon}
  <div class="row"><label>備註</label><input class="remark" placeholder="備註"></div>
  <div class="subtotal line-sub">$${item.price}</div>
  <button class="delete" onclick="this.closest('.line-card').remove();calculate()">刪除</button>`;
  box.appendChild(div);
  enhanceSelects(div);
  calculate();
}
function changeLineQty(id,delta){
  const el=document.getElementById(id);
  el.value=Math.max(1,Number(el.value||1)+delta);
  calculate();
}
function toggleAddressRequired(){
  const isDelivery=document.getElementById("takeType").value==="外送";
  document.getElementById("address").required=isDelivery;
  document.getElementById("addressRequiredText").style.display=isDelivery?"inline":"none";
}
function calculate(){
  let qtyTotal=0, amountTotal=0;
  document.querySelectorAll(".line-card").forEach(row=>{
    const qty=Number(row.querySelector(".qty").value||0);
    const base=Number(row.dataset.price||0);
    const main=row.querySelector(".mainfood") && row.querySelector(".mainfood").value!=="REQUIRED" ? Number(row.querySelector(".mainfood").value||0):0;
    const addon=getAddonTotalFromRow(row);
    const sub=qty*(base+main+addon);
    qtyTotal+=qty; amountTotal+=sub;
    row.querySelector(".line-sub").textContent=`$${sub}`;
  });
  categories.forEach((cat,ci)=>{
    if(cat.mode!=="direct") return;
    cat.items.forEach((item,ii)=>{
      const qtyEl=document.getElementById(`direct-${ci}-${ii}`);
      if(!qtyEl || item.hidden || item.soldOut) return;
      const qty=Number(qtyEl.value||0);
      const sub=qty*item.price;
      qtyTotal+=qty; amountTotal+=sub;
      document.getElementById(`direct-sub-${ci}-${ii}`).textContent=`$${sub}`;
    });
  });
  const bag=Number(document.querySelector('input[name="drinkBag"]:checked')?.value||0);
  amountTotal+=bag;
  document.getElementById("qtyTotal").textContent=qtyTotal;
  document.getElementById("amountTotal").textContent=`$${amountTotal}`;
}
function validateOrder(){
  if(!document.getElementById("phone").value.trim()){
    alert("請務必填寫電話。");
    document.getElementById("phone").focus();
    return false;
  }
  if(document.getElementById("takeType").value==="外送" && !document.getElementById("address").value.trim()){
    alert("取餐方式為外送時，外送地址為必填。");
    document.getElementById("address").focus();
    return false;
  }
  return true;
}
function cleanItemName(name){
  return String(name || "").replace(/🌶️/g, "").replace(/🌶/g, "").replace(/\s+/g, " ").trim();
}
function normalizeItemName(name){
  return cleanItemName(name).replace(/\s+/g, "").trim();
}

function buildOrder(){
  if(!validateOrder()) return null;

  const lines = [];
  const items = [];
  let qtyTotal = 0;
  let amountTotal = 0;
  let missingMainFood = "";

  lines.push("【192巷食堂】");
  lines.push(`姓名：${document.getElementById("name").value || "未填"}`);
  lines.push(`電話：${document.getElementById("phone").value || "未填"}`);
  lines.push(`取餐方式：${document.getElementById("takeType").value || "未填"}`);
  lines.push(`外送地址：${document.getElementById("address").value || "未填"}`);
  lines.push(`公司名稱：${document.getElementById("company").value || "未填"}`);
  lines.push(`希望抵達時間/取餐時間：${document.getElementById("arriveTime").value || "未填"}`);
  lines.push(`餐具：${document.getElementById("utensils").value || "未填"}`);

  const bag = Number(document.querySelector('input[name="drinkBag"]:checked')?.value || 0);
  lines.push(`加購飲料袋：${bag ? "需要 (+$1)" : "不需要"}`);
  lines.push("");
  lines.push("訂購內容：");

  document.querySelectorAll(".line-card").forEach(row=>{
    const qty = Number(row.querySelector(".qty").value || 0);
    if(qty <= 0) return;

    const base = Number(row.dataset.price || 0);
    const mainEl = row.querySelector(".mainfood");
    const addonEl = row.querySelector(".addon-multi, .addon");
    const remarkEl = row.querySelector(".remark");

    if(mainEl && mainEl.value === "REQUIRED"){
      missingMainFood = cleanItemName(row.dataset.name);
      return;
    }

    const mainP = mainEl ? Number(mainEl.value || 0) : 0;
    const addonP = getAddonTotalFromRow(row);
    const unit = base + mainP + addonP;
    const sub = unit * qty;

    qtyTotal += qty;
    amountTotal += sub;

    let d = `${cleanItemName(row.dataset.name)}`;

    if(mainEl && mainEl.value !== "REQUIRED"){
      d += `｜主食:${mainEl.options[mainEl.selectedIndex].text}`;
    }

    if(addonEl){
      const addonText = getAddonTextFromRow(row);
      if(addonText){
        const addonLabel = row.dataset.cat && row.dataset.cat.includes("套餐") ? "換購" : "加購";
        d += `｜${addonLabel}:${addonText}`;
      }
    }

    if(remarkEl && remarkEl.value.trim()){
      d += `｜備註:${remarkEl.value.trim()}`;
    }

    d += `｜$${unit} x ${qty} = $${sub}`;
    lines.push(d);
    items.push(d);
  });

  if(missingMainFood){
    alert("「" + missingMainFood + "」請先選擇主食。");
    return null;
  }

  categories.forEach((cat,ci)=>{
    if(cat.mode !== "direct") return;

    cat.items.forEach((item,ii)=>{
      const qtyEl = document.getElementById(`direct-${ci}-${ii}`);
      if(!qtyEl || item.hidden || item.soldOut) return;

      const qty = Number(qtyEl.value || 0);
      if(qty <= 0) return;

      const remarkEl = document.getElementById(`direct-remark-${ci}-${ii}`);
      const remark = remarkEl ? remarkEl.value.trim() : "";
      const sub = qty * item.price;

      qtyTotal += qty;
      amountTotal += sub;

      let directLine = `${cleanItemName(item.name)}`;
      if(remark) directLine += `｜備註:${remark}`;
      directLine += `｜$${item.price} x ${qty} = $${sub}`;

      lines.push(directLine);
      items.push(directLine);
    });
  });

  if(bag){
    amountTotal += 1;
    lines.push("加購飲料袋｜$1 x 1 = $1");
    items.push("加購飲料袋｜$1 x 1 = $1");
  }

  if(qtyTotal === 0){
    lines.push("尚未選擇品項");
  }

  lines.push("");
  lines.push(`總數量：${qtyTotal} 份`);
  lines.push(`總金額：$${amountTotal}`);
  lines.push(`整體備註：${document.getElementById("memo").value || "無"}`);

  return {
    text: lines.join("\n"),
    qtyTotal,
    amountTotal,
    items,
    customer:{
      name: document.getElementById("name").value || "",
      phone: document.getElementById("phone").value || "",
      takeType: document.getElementById("takeType").value || "",
      address: document.getElementById("address").value || "",
      company: document.getElementById("company").value || "",
      arriveTime: document.getElementById("arriveTime").value || "",
      utensils: document.getElementById("utensils").value || "",
      drinkBag: bag ? "需要(+1)" : "不需要",
      memo: document.getElementById("memo").value || ""
    }
  };
}
  function queryOrder(){

  const phone =
    document.getElementById("queryPhone").value.trim();

  const result =
    document.getElementById("queryResult");

  if(!phone){
    alert("請輸入電話");
    return;
  }

  result.innerHTML = "查詢中...";

  fetch(
    GOOGLE_SCRIPT_URL +

  )

async function copyOrder(){const o=buildOrder();if(!o)return;await navigator.clipboard.writeText(o.text);alert("訂單文字已複製");}
let isSubmitting = false;

async function submitOrder(){
  if(isSubmitting) return;

  const o = buildOrder();
  if(!o) return;

  isSubmitting = true;

  const btn = document.querySelector('.mobile-cart-panel button:nth-child(2)');
  const oldText = btn ? btn.textContent : '送出訂單';

  if(btn){
    btn.disabled = true;
    btn.textContent = '送出中...';
    btn.style.opacity = '.6';
  }

  try{
    if(GOOGLE_SCRIPT_URL.includes("PASTE_")){
      alert("尚未設定 Google Apps Script 收單網址。");
      return;
    }

    await fetch(GOOGLE_SCRIPT_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(o)
    });

    alert("訂單已送出！");
    resetOrder();

  }catch(err){
    alert("送出失敗，訂單內容已保留，請稍後再按一次送出。");

  }finally{
    isSubmitting = false;

    if(btn){
      btn.disabled = false;
      btn.textContent = oldText || '送出訂單';
      btn.style.opacity = '1';
    }
  }
}
function resetOrder(){document.querySelectorAll(".line-card").forEach(x=>x.remove());document.querySelectorAll(".direct-qty").forEach(x=>x.value=0);document.querySelectorAll(".direct-remark").forEach(x=>x.value="");calculate();}

function applyRemoteMenuStatus(data){
  if(!data || !data.items){
    renderMenu();
    toggleAddressRequired();
    calculate();
    return;
  }

  const map = {};
  data.items.forEach(x=>{
    map[normalizeItemName(x.name)] = x;
  });

  categories.forEach(cat=>{
    cat.items.forEach(item=>{
      const info = map[normalizeItemName(item.name)];
      if(!info) return;

      const status = String(info.status || "正常").trim();
      const hiddenValue = String(info.hidden || "").trim();

      item.soldOut = status.includes("售完") || status.includes("停售") || status.includes("暫停");
      item.hidden = status === "隱藏" || hiddenValue === "TRUE" || hiddenValue === "是";

      if(info.price !== "" && info.price !== null && info.price !== undefined && !isNaN(Number(info.price))){
        item.price = Number(info.price);
      }
    });
  });

  renderMenu();
  toggleAddressRequired();
  calculate();
}

function loadMenuStatus(){
  if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_")){
    renderMenu();
    toggleAddressRequired();
    calculate();
    return;
  }

  const script = document.createElement("script");
  script.src = GOOGLE_SCRIPT_URL + "?action=status&callback=applyRemoteMenuStatus&t=" + Date.now();
  script.onerror = function(){
    console.warn("品項管理讀取失敗，改用本機菜單");
    renderMenu();
    toggleAddressRequired();
    calculate();
  };
  document.body.appendChild(script);
}


function ensureSelectSheet(){
  let mask = document.getElementById('selectSheetMask');
  let sheet = document.getElementById('selectSheet');
  if(!mask){
    mask = document.createElement('div');
    mask.id = 'selectSheetMask';
    mask.className = 'select-sheet-mask';
    mask.onclick = closeSelectSheet;
    document.body.appendChild(mask);
  }
  if(!sheet){
    sheet = document.createElement('div');
    sheet.id = 'selectSheet';
    sheet.className = 'select-sheet';
    document.body.appendChild(sheet);
  }
  return {mask, sheet};
}

function closeSelectSheet(){
  const mask = document.getElementById('selectSheetMask');
  const sheet = document.getElementById('selectSheet');
  if(mask) mask.classList.remove('show');
  if(sheet){
    sheet.classList.remove('show');
    sheet.innerHTML = '';
  }
}

function enhanceSelects(root){
  const scope = root || document;
  scope.querySelectorAll('select:not([data-enhanced="1"])').forEach(sel=>{
    sel.dataset.enhanced = '1';
    sel.classList.add('custom-native-hidden');

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'custom-select-btn';

    function refreshBtn(){
      const opt = sel.options[sel.selectedIndex];
      btn.textContent = opt ? opt.text : '請選擇';
      btn.disabled = !!sel.disabled;
      btn.classList.toggle('disabled', !!sel.disabled);
    }

    btn.onclick = function(e){
      e.preventDefault();
      e.stopPropagation();
      if(sel.disabled) return;
      openSingleSelectSheet(sel, refreshBtn);
    };

    sel.parentNode.insertBefore(btn, sel.nextSibling);
    sel.addEventListener('change', refreshBtn);
    refreshBtn();
  });
}

function openSingleSelectSheet(sel, refreshBtn){
  const ui = ensureSelectSheet();
  const title = sel.closest('.row')?.querySelector('label')?.textContent || sel.parentElement?.querySelector('label')?.textContent || '請選擇';
  ui.sheet.innerHTML = `<div class="select-sheet-title">${title}</div>`;

  Array.from(sel.options).forEach((opt, idx)=>{
    const label = document.createElement('label');
    label.className = 'select-choice';
    if(idx === sel.selectedIndex) label.classList.add('selected');
    if(opt.disabled) label.classList.add('disabled');

    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'select_sheet_' + Math.random().toString(36).slice(2);
    radio.checked = idx === sel.selectedIndex;
    radio.disabled = !!opt.disabled;

    const span = document.createElement('span');
    span.textContent = opt.text;

    label.appendChild(radio);
    label.appendChild(span);

    label.onclick = function(e){
      e.preventDefault();
      if(opt.disabled) return;
      sel.selectedIndex = idx;
      // 不設定 sel.value，避免多個選項價格相同時跳回第一個同價選項
      sel.dispatchEvent(new Event('change', { bubbles:true }));
      if(refreshBtn) refreshBtn();
      closeSelectSheet();
    };

    ui.sheet.appendChild(label);
  });

  const actions = document.createElement('div');
  actions.className = 'sheet-actions';
  actions.innerHTML = `<button type="button" class="sheet-close">取消</button>`;
  actions.querySelector('button').onclick = closeSelectSheet;
  ui.sheet.appendChild(actions);

  ui.mask.classList.add('show');
  ui.sheet.classList.add('show');
}

function openAddonSheet(button){
  const box = button.closest('.addon-multi');
  if(!box) return;
  const ui = ensureSelectSheet();
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  let selected = new Set(String(box.dataset.selected || '').split(',').filter(x=>x !== ''));
  const title = box.closest('.row')?.querySelector('label')?.textContent || '加購';
  ui.sheet.innerHTML = `<div class="select-sheet-title">${title}（可複選）</div>`;

  options.forEach((opt, idx)=>{
    const key = String(idx);
    const label = document.createElement('label');
    label.className = 'select-choice';
    if(selected.has(key)) label.classList.add('selected');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = selected.has(key);

    const span = document.createElement('span');
    span.textContent = `${opt[0]}${Number(opt[1] || 0) ? ' +$' + opt[1] : ''}`;

    cb.onchange = function(){
      if(cb.checked) selected.add(key); else selected.delete(key);
      box.dataset.selected = Array.from(selected).join(',');
      label.classList.toggle('selected', cb.checked);
      updateAddonButton(box);
    };

    label.appendChild(cb);
    label.appendChild(span);
    ui.sheet.appendChild(label);
  });

  const actions = document.createElement('div');
  actions.className = 'sheet-actions';
  actions.innerHTML = `<button type="button" class="sheet-close">完成</button>`;
  actions.querySelector('button').onclick = function(){
    updateAddonButton(box);
    closeSelectSheet();
    calculate();
  };
  ui.sheet.appendChild(actions);

  ui.mask.classList.add('show');
  ui.sheet.classList.add('show');
}

function updateAddonButton(box){
  const btn = box.querySelector('.addon-multi-btn');
  if(!btn) return;
  const text = getAddonText(box);
  btn.textContent = text || '無';
  calculate();
}


function toggleCart(){document.getElementById("mobileCart").classList.toggle("open");}
enhanceSelects(document);
loadMenuStatus();
</script>
