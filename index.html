<body>
<header>
<h1>１９２巷食堂</h1>
<p style="
margin-top:12px;
line-height:1.9;
font-size:14px;">
📍 高雄市左營區文慈路192巷26號<br>
☎ 07-350-1245<br>
🕒 營業時間 10:00–20:00
</p>
</header>

  <div class="card">
  <h2>🔍 查詢我的訂單</h2>

  <label>電話</label>
  <input id="queryPhone" placeholder="請輸入訂購電話">

  <button
    style="width:100%;margin-top:10px;"
    onclick="queryOrder()">
    查詢最近一筆訂單
  </button>

  <div
    id="queryResult"
    style="margin-top:12px;line-height:1.8;white-space:pre-wrap;">
  </div>
</div>
  
<div class="container">
<div class="card">
<h2>訂購人資料</h2>
<div class="grid">
<div><label>姓名</label><input id="name" placeholder="請輸入姓名或Line名字" autocomplete="off"></div>
<div><label>電話 <span style="color:red">*</span></label><input id="phone" placeholder="務必填寫電話" autocomplete="off" required></div>
<div><label>取餐方式</label><select id="takeType" onchange="toggleAddressRequired()"><option>外送</option><option>外帶</option><option>內用</option></select><div id="deliveryLockNote" class="delivery-lock-note"></div></div>
<div><label>外送地址 <span id="addressRequiredText" style="color:red">*</span></label><input id="address" placeholder="外送時必填" autocomplete="off"></div>
<div><label>公司名稱</label><input id="company" placeholder="請輸入公司名稱" autocomplete="off"></div>
<div><label>希望抵達時間/取餐時間</label><input id="arriveTime" placeholder="例如：18:30"></div>
<div><label>餐具</label><select id="utensils"><option>不需要餐具</option><option>需要餐具</option></select></div>
</div>
<p class="notice">外送注意事項:<br>2公里內滿500元可外送，需於90分鐘前預訂，否則將依現場實際狀況安排製作餐點。<br><span class="red-bold">假日及國定假日無外送服務。</span></p>
</div>

<div class="category-nav" id="categoryNav"></div>
<div class="card"><div id="menu"></div></div>

<div class="card drinkbag">
<h2>加購飲料袋 ($1元)</h2>
<label><input type="radio" name="drinkBag" value="0" checked onchange="calculate()" style="width:auto"> 不需要</label>
<label><input type="radio" name="drinkBag" value="1" onchange="calculate()" style="width:auto"> 需要 (+$1)</label>
</div>

<div class="card">
<h2>整體備註</h2>
<textarea id="memo" rows="4" placeholder="例如：不要辣、分開裝"></textarea>
</div>
</div>

<div class="mobile-cart" id="mobileCart">
  <div class="mobile-cart-bar" onclick="openCartReview()">
    <span>🛒 訂購內容　<span id="qtyTotal">0</span> 份</span>
    <span class="mobile-cart-total" id="amountTotal">$0</span>
  </div>
</div>
<div class="cart-modal-mask" id="cartModalMask" onclick="closeCartReview()"></div>

  <div class="cart-modal-body" id="cartReviewBody"></div>
</div>
<div class="cart-modal-footer" id="cartModalFooter">
  <button class="continue-btn" onclick="closeCartReview()">繼續訂購</button>
  <button class="submit-btn" onclick="submitOrder()">送出訂單</button>
</div>
<div class="toast" id="toast">已加入訂購內容</div>
<div class="select-sheet-mask" id="selectSheetMask" onclick="closeSelectSheet()"></div>
<div class="select-sheet" id="selectSheet"></div>

<div class="cart-added-note" id="cartAddedNote"></div>

let cartItems = [];

function optionHTML(list, empty="無"){
  let h = "";
  if(empty === "請選擇主食"){
    h = `<option value="REQUIRED" selected disabled>請選擇主食</option>`;
  }else{
    h = `<option value="0">${empty}</option>`;
  }
  list.forEach(o=>h+=`<option value="${o[1]}">${o[0]}${o[1]?" +$"+o[1]:""}</option>`);
  return h;
}


function getAddonOptions(item){
  const base = item && item.addonSet && optionSets[item.addonSet] ? optionSets[item.addonSet] : [];
  const extra = item && Array.isArray(item.addonExtra) ? item.addonExtra : [];
  return base.concat(extra);
}

function addonMultiHTML(list){
  const encoded = encodeURIComponent(JSON.stringify(list || []));
  return `<div class="addon-multi" data-options="${encoded}" data-selected=""><button type="button" class="addon-multi-btn" onclick="openAddonSheet(this)">無</button></div>`;
}

function addonSingleHTML(list){
  const encoded = encodeURIComponent(JSON.stringify(list || []));
  return `<div class="addon-single" data-options="${encoded}" data-selected=""><button type="button" class="addon-multi-btn" onclick="openAddonSingleSheet(this)">無</button></div>`;
}

function getAddonSingleSelection(box){
  if(!box) return null;
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  const idx = String(box.dataset.selected || '');
  if(idx === '') return null;
  return options[Number(idx)] || null;
}

function openAddonSingleSheet(btn){
  const box = btn.closest('.addon-single');
  if(!box) return;
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  const selected = String(box.dataset.selected || '');
  const title = '換購飲料（單選）';
  const mask = document.getElementById('selectSheetMask');
  const sheet = document.getElementById('selectSheet');
  if(!mask || !sheet) return;

  let html = `<div class="select-sheet-title">${title}</div>`;
  html += `<button type="button" class="select-option-btn ${selected===''?'selected':''}" onclick="chooseAddonSingle('${boxId_(box)}','')">無</button>`;
  options.forEach((o,i)=>{
    const text = `${o[0]}${Number(o[1]||0)?' +$'+o[1]:''}`;
    html += `<button type="button" class="select-option-btn ${String(i)===selected?'selected':''}" onclick="chooseAddonSingle('${boxId_(box)}','${i}')">${text}</button>`;
  });
  html += `<div class="sheet-actions"><button type="button" class="sheet-done" onclick="finishAddonSheet()">完成</button></div>`;
  sheet.innerHTML = html;
  mask.classList.add('show');
  sheet.classList.add('show');
}

function boxId_(box){
  if(!box.id) box.id = 'box-' + Date.now() + '-' + Math.floor(Math.random()*100000);
  return box.id;
}

function chooseAddonSingle(id,idx){
  const box = document.getElementById(id);
  if(!box) return;
  box.dataset.selected = idx;
  const btn = box.querySelector('.addon-multi-btn');
  if(btn){
    if(idx === '') btn.textContent = '無';
    else{
      let options=[];
      try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options=[]; }
      const o = options[Number(idx)];
      btn.textContent = o ? `${o[0]}${Number(o[1]||0)?' +$'+o[1]:''}` : '無';
    }
  }
  updateLineSubtotal(box.closest('.line-card'));
  closeSelectSheet();
}



function updateAddonMultiButton(box){
  if(!box) return;
  const btn = box.querySelector('.addon-multi-btn');
  if(!btn) return;
  const text = getAddonText(box);
  btn.textContent = text || '無';
  const card = box.closest('.line-card');
  if(card) updateLineSubtotal(card);
}

function getAddonSelections(box){
  if(!box) return [];
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  const selected = String(box.dataset.selected || '').split(',').filter(x=>x !== '').map(Number);
  return selected.map(i=>options[i]).filter(Boolean);
}

function getAddonTotal(box){
  return getAddonSelections(box).reduce((sum,o)=>sum + Number(o[1] || 0), 0);
}

function getAddonText(box){
  const selected = getAddonSelections(box);
  if(!selected.length) return '';
  return selected.map(o => `${o[0]}${Number(o[1] || 0) ? ' +$' + o[1] : ''}`).join('、');
}

function getAddonTotalFromRow(row){
  const single = row.querySelector('.addon-single');
  if(single){
    const o = getAddonSingleSelection(single);
    return o ? Number(o[1] || 0) : 0;
  }
  const multi = row.querySelector('.addon-multi');
  if(multi) return getAddonTotal(multi);
  const sel = row.querySelector('.addon');
  return sel ? Number(sel.value || 0) : 0;
}

function getAddonTextFromRow(row){
  const single = row.querySelector('.addon-single');
  if(single){
    const o = getAddonSingleSelection(single);
    return o ? `${o[0]}${Number(o[1] || 0) ? ' +$' + o[1] : ''}` : '';
  }
  const multi = row.querySelector('.addon-multi');
  if(multi) return getAddonText(multi);
  const sel = row.querySelector('.addon');
  if(!sel || Number(sel.value || 0) === 0) return '';
  const opt = sel.options[sel.selectedIndex];
  return opt ? opt.text : '';
}

function showAddFeedback(message, button){
  const msg = message || "已加入訂購內容";
  const note = document.getElementById("cartAddedNote");
  if(note){
    note.textContent = "✅ " + msg;
    note.classList.add("show");
    clearTimeout(window.__cartAddedNoteTimer);
    window.__cartAddedNoteTimer = setTimeout(()=>note.classList.remove("show"),1800);
  }
  if(button){
    const oldText = button.textContent;
    button.classList.add("just-added");
    button.textContent = "已加入 ✓";
    button.disabled = true;
    setTimeout(()=>{
      button.classList.remove("just-added");
      button.textContent = oldText || "加入訂購內容";
      button.disabled = false;
    },1000);
  }
}
function flashItemFeedback(container, message){
  if(!container) return;
  let fb = container.querySelector(".add-feedback");
  if(!fb){
    fb = document.createElement("div");
    fb.className = "add-feedback";
    container.appendChild(fb);
  }
  fb.textContent = "✅ " + (message || "已加入訂購內容");
  fb.classList.add("show");
  clearTimeout(fb.__timer);
  fb.__timer = setTimeout(()=>fb.classList.remove("show"),1800);
}
function cleanFeedbackName(name){
  if(typeof cleanItemName === "function") return cleanItemName(name);
  return String(name || "").replace(/🌶️|🌶/g,"").trim();
}

function showToast(msg){
  const t=document.getElementById("toast");
  if(!t) return;
  t.textContent=msg || "已加入訂購內容";
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>t.classList.remove("show"),1400);
}
function makeCartItem(data){
  return Object.assign({id:"cart-"+Date.now()+"-"+Math.floor(Math.random()*100000),name:"",category:"",basePrice:0,unitPrice:0,qty:1,mainText:"",addonText:"",remark:"",source:"multi"}, data || {});
}

function cartMergeKey(item){
  return [
    cleanItemName(item.name),
    item.category || '',
    item.unitPrice || 0,
    item.mainText || '',
    item.addonText || '',
    item.source || ''
  ].join('||');
}

function addOrMergeCartItem(newItem){
  // 有備註不合併，避免特殊需求被吃掉
  if(String(newItem.remark || '').trim()){
    cartItems.push(newItem);
    return;
  }
  const key = cartMergeKey(newItem);
  const existed = cartItems.find(x => !String(x.remark || '').trim() && cartMergeKey(x) === key);
  if(existed){
    existed.qty = Number(existed.qty || 0) + Number(newItem.qty || 0);
  }else{
    cartItems.push(newItem);
  }
}

function cartItemLine(item){
  let d = `${cleanItemName(item.name)}`;
  if(item.mainText) d += `｜主食:${item.mainText}`;
  if(item.addonText){
    const addonLabel = item.category && item.category.includes("套餐") ? "換購" : "加購";
    d += `｜${addonLabel}:${item.addonText}`;
  }
  if(item.remark) d += `｜備註:${item.remark}`;
  d += `｜$${item.unitPrice} x ${item.qty} = $${item.unitPrice * item.qty}`;
  return d;
}
function cartTotals(){
  let qtyTotal=0, amountTotal=0;
  cartItems.forEach(item=>{qtyTotal+=Number(item.qty||0);amountTotal+=Number(item.unitPrice||0)*Number(item.qty||0);});
  const bag=Number(document.querySelector('input[name="drinkBag"]:checked')?.value||0);
  if(bag) amountTotal+=1;
  return {qtyTotal, amountTotal};
}
function updateCartBar(){
  const total=cartTotals();
  const q=document.getElementById("qtyTotal"), a=document.getElementById("amountTotal");
  if(q) q.textContent=total.qtyTotal;
  if(a) a.textContent="$"+total.amountTotal;
}
function openCartReview(){
  renderCartReview();
  document.getElementById("cartModalMask").classList.add("show");
  document.getElementById("cartModal").classList.add("show");
  document.getElementById("cartModalFooter").classList.add("show");
}
function closeCartReview(){
  document.getElementById("cartModalMask").classList.remove("show");
  document.getElementById("cartModal").classList.remove("show");
  document.getElementById("cartModalFooter").classList.remove("show");
}
function renderCartReview(){
  const body=document.getElementById("cartReviewBody");
  if(!body) return;
  if(!cartItems.length){
    body.innerHTML=`<div class="cart-empty">目前尚未加入餐點<br>請先回到菜單選擇餐點</div>`;
    updateCartBar();
    return;
  }
  let html="";
  cartItems.forEach((item,idx)=>{
    const meta=[];
    if(item.mainText) meta.push(`主食：${item.mainText}`);
    if(item.addonText) meta.push(`${item.category && item.category.includes("套餐") ? "換購" : "加購"}：${item.addonText}`);
    if(item.remark) meta.push(`備註：${item.remark}`);
    html+=`<div class="cart-confirm-item">
      <div class="cart-confirm-title">${idx+1}. ${cleanItemName(item.name)}</div>
      ${meta.length ? `<div class="cart-confirm-meta">${meta.join("<br>")}</div>` : ""}
      <div class="cart-confirm-controls">
        <div class="cart-confirm-qty">
          <button onclick="changeCartQty('${item.id}',-1)">−</button>
          <span>${item.qty}</span>
          <button onclick="changeCartQty('${item.id}',1)">＋</button>
        </div>
        <div class="cart-confirm-subtotal">$${item.unitPrice * item.qty}</div>
        <button class="cart-confirm-delete" onclick="deleteCartItem('${item.id}')">刪除</button>
      </div>
    </div>`;
  });
  body.innerHTML=html;
  updateCartBar();
}
function changeCartQty(id,delta){
  const item=cartItems.find(x=>x.id===id);
  if(!item) return;
  item.qty=Math.max(1,Number(item.qty||1)+delta);
  renderCartReview();
}
function deleteCartItem(id){
  cartItems=cartItems.filter(x=>x.id!==id);
  renderCartReview();
}
function clearDirectInputs(){
  document.querySelectorAll(".direct-qty").forEach(el=>el.value=0);
  document.querySelectorAll(".direct-remark").forEach(el=>el.value="");
}
function addDirectToCart(ci,ii,btn){
  const cat=categories[ci], item=cat.items[ii];
  if(item.soldOut){ alert("此品項今日售完。"); return; }
  const qtyEl=document.getElementById(`direct-${ci}-${ii}`);
  if(!qtyEl) return;
  const qty=Number(qtyEl.value || 0);
  if(qty<=0){ alert("請先選擇數量。"); return; }
  const remarkEl=document.getElementById(`direct-remark-${ci}-${ii}`);
  const newItem = makeCartItem({
    name:item.name, category:cat.name, basePrice:item.price, unitPrice:item.price,
    qty:qty, remark:remarkEl ? remarkEl.value.trim() : "", source:"direct"
  });
  if(typeof addOrMergeCartItem === "function") addOrMergeCartItem(newItem); else cartItems.push(newItem);
  const addedName = cleanFeedbackName(item.name);
  qtyEl.value=0;
  if(remarkEl) remarkEl.value="";
  calculate();
  updateCartBar();
  if(document.getElementById("cartModal")?.classList.contains("show")) renderCartReview();
  showToast("已加入：" + addedName + " x" + qty);
  showAddFeedback("已加入：" + addedName + " x" + qty, btn);
  flashItemFeedback(btn ? btn.closest(".item-card") : qtyEl.closest(".item-card"), "已加入：" + addedName + " x" + qty);
}

function renderMenu(){
  const menu=document.getElementById("menu"); 
  menu.innerHTML="";
  categories.forEach((cat,ci)=>{
    let html=`<div class="category" id="cat-${ci}"><div class="category-title">${cat.name}${cat.hint?`<span class="hint">(${cat.hint})</span>`:""}</div>`;
    cat.items.forEach((item,ii)=>{
      if(item.hidden) return;

      const soldOut = item.soldOut === true;
      const cardClass = soldOut ? "item-card soldout" : "item-card";
      const badge = soldOut ? `<span class="soldout-badge">售完</span>` : "";

      html+=`<div class="${cardClass}" data-ci="${ci}" data-ii="${ii}">
        <div class="item-head"><div class="item-name">${item.name}${badge}</div><div class="price">$${item.price}</div></div>`;

      if(cat.mode==="direct"){
        html+=`<div class="row"><label>數量</label><div class="qtybox"><button class="qtybtn" ${soldOut?"disabled":""} onclick="changeDirectQty(${ci},${ii},-1)">-</button><input class="qty direct-qty" id="direct-${ci}-${ii}" value="0" type="number" min="0" ${soldOut?"disabled":""} oninput="calculate()"><button class="qtybtn" ${soldOut?"disabled":""} onclick="changeDirectQty(${ci},${ii},1)">+</button></div></div>
        <div class="row"><label>備註</label><input class="direct-remark" id="direct-remark-${ci}-${ii}" placeholder="備註" ${soldOut?"disabled":""}></div>
        <div class="subtotal" id="direct-sub-${ci}-${ii}">$0</div><button class="add" ${soldOut?"disabled":""} onclick="addDirectToCart(${ci},${ii},this)">${soldOut?"售完":"加入訂購內容"}</button>${soldOut?`<div class="status-note">此品項今日售完</div>`:""}`;
      }else{
        html+=`<div id="lines-${ci}-${ii}"></div><button class="add spec-btn" ${soldOut?"disabled":""} onclick="addLine(${ci},${ii})">${soldOut?"售完":"選擇規格"}</button>${soldOut?`<div class="status-note">此品項今日售完</div>`:""}`;
      }

      html+=`</div>`;
    });
    html+=`</div>`;
    menu.innerHTML+=html;
  });
  renderCategoryNav();
  enhanceSelects(menu);
}
function changeDirectQty(ci,ii,delta){
  const el=document.getElementById(`direct-${ci}-${ii}`);
  if(!el || el.disabled) return;
  el.value=Math.max(0,Number(el.value||0)+delta);
  calculate();
}
function addLine(ci,ii){
  const cat=categories[ci], item=cat.items[ii];
  if(item.soldOut){ alert("此品項今日售完。"); return; }

  const box=document.getElementById(`lines-${ci}-${ii}`);
  const existed=box.querySelector(".line-card");
  if(existed){ existed.remove(); return; }

  const hasMain=item.mainSet||cat.mainSet;
  const main=hasMain?`<div class="row"><label>主食</label><select class="mainfood" onchange="updateLineSubtotal(this.closest('.line-card'))">${optionHTML(mainSets[item.mainSet||cat.mainSet],"請選擇主食")}</select></div>`:"";
  const addonTitle=cat.addonTitle || "加購";
  const addonOptions=getAddonOptions(item);
  const addon=addonOptions.length?`<div class="row"><label>${addonTitle}</label>${cat.name.includes("套餐") ? addonSingleHTML(addonOptions) : addonMultiHTML(addonOptions)}</div>`:"";

  const card=document.createElement("div");
  card.className="line-card";
  card.dataset.cat=cat.name;
  card.dataset.name=item.name;
  card.dataset.price=item.price;
  card.innerHTML=`
    ${main}
    ${addon}
    <div class="row"><label>數量</label><input class="qty" type="number" min="1" value="1" oninput="updateLineSubtotal(this.closest('.line-card'))"></div>
    <div class="row"><label>備註</label><input class="remark" placeholder="備註"></div>
    <div class="subtotal">$${item.price}</div>
    <button class="confirm-add-btn" style="width:100%;margin-top:8px" type="button" onclick="tryConfirmAddLine(this)">加入訂購內容</button>
  `;
  box.appendChild(card);
  enhanceSelects(card);
  updateLineSubtotal(card);
}


function tryConfirmAddLine(btn){
  const row = btn ? btn.closest('.line-card') : null;
  if(!row) return;
  const mainEl = row.querySelector('.mainfood');
  if(mainEl){
    const selectedText = mainEl.options && mainEl.selectedIndex >= 0 ? String(mainEl.options[mainEl.selectedIndex].text || '') : '';
    if(!mainEl.value || mainEl.value === 'REQUIRED' || selectedText.includes('請選擇主食')){
      alert('請選擇主食再加入訂購內容。');
      return;
    }
  }
  confirmAddLine(row, btn);
}

function confirmAddLine(row, btn){
  if(!row) return;
  const mainEl=row.querySelector(".mainfood");
  if(mainEl){
    const selectedText = mainEl.options && mainEl.selectedIndex >= 0 ? String(mainEl.options[mainEl.selectedIndex].text || "") : "";
    if(!mainEl.value || mainEl.value==="REQUIRED" || selectedText.includes("請選擇主食")){
      alert("請選擇主食再加入訂購內容。");
      return;
    }
  }
  const qty=Math.max(1,Number(row.querySelector(".qty")?.value||1));
  const base=Number(row.dataset.price||0);
  const mainP=mainEl?Number(mainEl.value||0):0;
  const addonP=getAddonTotalFromRow(row);
  const unit=base+mainP+addonP;
  let mainText="";
  if(mainEl && mainEl.value!=="REQUIRED") mainText=mainEl.options[mainEl.selectedIndex].text;
  const addonText=getAddonTextFromRow(row);
  const remark=row.querySelector(".remark")?.value.trim()||"";
  const addedName = cleanFeedbackName(row.dataset.name);
  const newItem = makeCartItem({
    name:row.dataset.name, category:row.dataset.cat, basePrice:base, unitPrice:unit,
    qty:qty, mainText:mainText, addonText:addonText, remark:remark, source:"multi"
  });
  if(typeof addOrMergeCartItem === "function") addOrMergeCartItem(newItem); else cartItems.push(newItem);
  const parentCard = row.closest(".item-card");
  row.remove();
  updateCartBar();
  showToast("已加入：" + addedName + " x" + qty);
  showAddFeedback("已加入：" + addedName + " x" + qty, btn);
  flashItemFeedback(parentCard, "已加入：" + addedName + " x" + qty);
}

function updateLineSubtotal(card){
  if(!card) return;
  const base=Number(card.dataset.price||0);
  const qty=Math.max(1,Number(card.querySelector(".qty")?.value||1));
  const mainEl=card.querySelector(".mainfood");
  const mainP=mainEl && mainEl.value!=="REQUIRED" ? Number(mainEl.value||0) : 0;
  const addonP=getAddonTotalFromRow(card);
  const unit=base+mainP+addonP;
  const sub=unit*qty;
  const el=card.querySelector(".subtotal");
  if(el) el.textContent="$"+sub;
}

function cleanItemName(name){
  return String(name || "").replace(/🌶️/g, "").replace(/🌶/g, "").replace(/\s+/g, " ").trim();
}
function normalizeItemName(name){
  return cleanItemName(name).replace(/\s+/g, "").trim();
}

function buildOrder(){
  if(!validateOrder()) return null;
  const lines=[];
  const items=[];
  let qtyTotal=0;
  let amountTotal=0;
  lines.push("【192巷食堂】");
  lines.push(`姓名：${document.getElementById("name").value || "未填"}`);
  lines.push(`電話：${document.getElementById("phone").value || "未填"}`);
  lines.push(`取餐方式：${document.getElementById("takeType").value || "未填"}`);
  lines.push(`外送地址：${document.getElementById("address").value || "未填"}`);
  lines.push(`公司名稱：${document.getElementById("company").value || "未填"}`);
  lines.push(`希望抵達時間/取餐時間：${document.getElementById("arriveTime").value || "未填"}`);
  lines.push(`餐具：${document.getElementById("utensils").value || "未填"}`);
  const bag=Number(document.querySelector('input[name="drinkBag"]:checked')?.value||0);
  lines.push(`加購飲料袋：${bag ? "需要 (+$1)" : "不需要"}`);
  lines.push("");
  lines.push("訂購內容：");
  cartItems.forEach(item=>{
    const d=cartItemLine(item);
    qtyTotal+=Number(item.qty||0);
    amountTotal+=Number(item.unitPrice||0)*Number(item.qty||0);
    lines.push(d);
    items.push(d);
  });
  if(bag){
    amountTotal+=1;
    lines.push("加購飲料袋｜$1 x 1 = $1");
    items.push("加購飲料袋｜$1 x 1 = $1");
  }
  if(qtyTotal===0) lines.push("尚未選擇品項");
  lines.push("");
  lines.push(`總數量：${qtyTotal} 份`);
  lines.push(`總金額：$${amountTotal}`);
  lines.push(`整體備註：${document.getElementById("memo").value || "無"}`);
  return {
    text:lines.join("\n"),
    qtyTotal,
    amountTotal,
    items,
    customer:{
      name:document.getElementById("name").value||"",
      phone:document.getElementById("phone").value||"",
      takeType:document.getElementById("takeType").value||"",
      address:document.getElementById("address").value||"",
      company:document.getElementById("company").value||"",
      arriveTime:document.getElementById("arriveTime").value||"",
      utensils:document.getElementById("utensils").value||"",
      drinkBag:bag?"需要(+1)":"不需要",
      memo:document.getElementById("memo").value||""
    }
  };
}
async function copyOrder(){
  openCartReview();
}
let isSubmitting = false;

async function submitOrder(){
  if(isSubmitting) return;
  if(!cartItems.length){ alert("請先加入訂購內容。"); return; }

  const o = buildOrder();
  if(!o) return;

  isSubmitting = true;

  const btn = document.querySelector('.cart-modal-footer .submit-btn') || document.querySelector('.mobile-cart-panel button:nth-child(2)');
  const oldText = btn ? btn.textContent : '送出訂單';

  if(btn){
    btn.disabled = true;
    btn.textContent = '送出中...';
    btn.style.opacity = '.6';
  }

  try{
    if(GOOGLE_SCRIPT_URL.includes("PASTE_")){
      alert("尚未設定 Google Apps Script 收單網址。");
      return;
    }

    await fetch(GOOGLE_SCRIPT_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(o)
    });

    alert("訂單已送出！");
    cartItems=[];
    closeCartReview();
    resetOrder(false);
    cartItems=[];
    closeCartReview();
    resetOrder(false);
    resetOrder();

  }catch(err){
    alert("送出失敗，訂單內容已保留，請稍後再按一次送出。");

  }finally{
    isSubmitting = false;

    if(btn){
      btn.disabled = false;
      btn.textContent = oldText || '送出訂單';
      btn.style.opacity = '1';
    }
  }
}
function resetOrder(askConfirm=true){
  if(askConfirm && !confirm("確定要清空訂單嗎？")) return;
  cartItems=[];
  document.querySelectorAll(".line-card").forEach(e=>e.remove());
  clearDirectInputs();
  document.querySelectorAll('input[name="drinkBag"][value="0"]').forEach(e=>e.checked=true);
  const memo=document.getElementById("memo");
  if(memo) memo.value="";
  calculate();
  renderCartReview();
}


let storeDeliverySettings = {
  deliveryAllowed:true,
  deliveryMessage:""
};

function applyDeliverySettingsFromStore(store){
  const takeType = document.getElementById("takeType");
  const note = document.getElementById("deliveryLockNote");
  if(!takeType) return;

  let allowed = true;
  let message = "";

  if(store && store.deliveryAllowed === false){
    allowed = false;
    message = store.deliveryMessage || "今日暫停外送，請選擇外帶或內用。";
  }

  storeDeliverySettings.deliveryAllowed = allowed;
  storeDeliverySettings.deliveryMessage = message;

  Array.from(takeType.options).forEach(opt=>{
    if(opt.text === "外送"){
      opt.disabled = !allowed;
      opt.classList.toggle("delivery-disabled", !allowed);
    }
  });

  // 若 Google Sheet 設定今日不可外送（例如假日），預設直接切換為外帶
  if(!allowed){
    takeType.value = "外帶";
  }

  if(note){
    note.textContent = message;
    note.classList.toggle("show", !allowed);
  }

  toggleAddressRequired();
}

function fetchStoreDeliverySettings(){
  if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_")) return;
  const old = document.getElementById("storeDeliveryScript");
  if(old) old.remove();

  const script = document.createElement("script");
  script.id = "storeDeliveryScript";
  script.src = GOOGLE_SCRIPT_URL + "?action=storeSettings&callback=applyStoreSettingsCallback&t=" + Date.now();
  script.onerror = function(){
    console.warn("店家設定讀取失敗，沿用預設外送設定");
  };
  document.body.appendChild(script);
}

function applyStoreSettingsCallback(data){
  if(data && data.ok && data.store){
    applyDeliverySettingsFromStore(data.store);
  }
}

function loadMenuStatus(){
  fetchStoreDeliverySettings();
  renderMenu();
  toggleAddressRequired();
  calculate();

  if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_")){
    return;
  }

  const oldScript = document.getElementById("remoteMenuStatusScript");
  if(oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "remoteMenuStatusScript";
  script.src = GOOGLE_SCRIPT_URL + "?action=status&callback=applyRemoteMenuStatus&t=" + Date.now();
  script.onerror = function(){
    console.warn("品項管理讀取失敗，已保留本機菜單");
  };
  document.body.appendChild(script);
}


function ensureSelectSheet(){
  let mask = document.getElementById('selectSheetMask');
  let sheet = document.getElementById('selectSheet');
  if(!mask){
    mask = document.createElement('div');
    mask.id = 'selectSheetMask';
    mask.className = 'select-sheet-mask';
    mask.onclick = closeSelectSheet;
    document.body.appendChild(mask);
  }
  if(!sheet){
    sheet = document.createElement('div');
    sheet.id = 'selectSheet';
    sheet.className = 'select-sheet';
    document.body.appendChild(sheet);
  }
  return {mask, sheet};
}

function closeSelectSheet(){
  finishAddonSheet();
}

function enhanceSelects(root){
  const scope = root || document;
  scope.querySelectorAll('select:not([data-enhanced="1"])').forEach(sel=>{
    sel.dataset.enhanced = '1';
    sel.classList.add('custom-native-hidden');

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'custom-select-btn';

    function refreshBtn(){
      const opt = sel.options[sel.selectedIndex];
      btn.textContent = opt ? opt.text : '請選擇';
      btn.disabled = !!sel.disabled;
      btn.classList.toggle('disabled', !!sel.disabled);
    }

    btn.onclick = function(e){
      e.preventDefault();
      e.stopPropagation();
      if(sel.disabled) return;
      openSingleSelectSheet(sel, refreshBtn);
    };

    sel.parentNode.insertBefore(btn, sel.nextSibling);
    sel.addEventListener('change', refreshBtn);
    refreshBtn();
  });
}

function openSingleSelectSheet(sel, refreshBtn){
  const ui = ensureSelectSheet();
  const title = sel.closest('.row')?.querySelector('label')?.textContent || sel.parentElement?.querySelector('label')?.textContent || '請選擇';
  ui.sheet.innerHTML = `<div class="select-sheet-title">${title}</div>`;

  Array.from(sel.options).forEach((opt, idx)=>{
    const label = document.createElement('label');
    label.className = 'select-choice';
    if(idx === sel.selectedIndex) label.classList.add('selected');
    if(opt.disabled) label.classList.add('disabled');

    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'select_sheet_' + Math.random().toString(36).slice(2);
    radio.checked = idx === sel.selectedIndex;
    radio.disabled = !!opt.disabled;

    const span = document.createElement('span');
    span.textContent = opt.text;

    label.appendChild(radio);
    label.appendChild(span);

    label.onclick = function(e){
      e.preventDefault();
      if(opt.disabled) return;
      sel.selectedIndex = idx;
      // 不設定 sel.value，避免多個選項價格相同時跳回第一個同價選項
      sel.dispatchEvent(new Event('change', { bubbles:true }));
      if(refreshBtn) refreshBtn();
      closeSelectSheet();
    };

    ui.sheet.appendChild(label);
  });

  const actions = document.createElement('div');
  actions.className = 'sheet-actions';
  actions.innerHTML = `<button type="button" class="sheet-close">取消</button>`;
  actions.querySelector('button').onclick = closeSelectSheet;
  ui.sheet.appendChild(actions);

  ui.mask.classList.add('show');
  ui.sheet.classList.add('show');
}

function openAddonSheet(button){
  const box = button.closest('.addon-multi');
  if(!box) return;
  const ui = ensureSelectSheet();
  let options = [];
  try{ options = JSON.parse(decodeURIComponent(box.dataset.options || '%5B%5D')); }catch(e){ options = []; }
  let selected = new Set(String(box.dataset.selected || '').split(',').filter(x=>x !== ''));
  const title = box.closest('.row')?.querySelector('label')?.textContent || '加購';

  ui.sheet.innerHTML = `<div class="select-sheet-title">${title}（可複選）</div>`;

  options.forEach((opt, idx)=>{
    const key = String(idx);
    const label = document.createElement('label');
    label.className = 'select-choice';
    if(selected.has(key)) label.classList.add('selected');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = selected.has(key);

    const span = document.createElement('span');
    span.textContent = `${opt[0]}${Number(opt[1] || 0) ? ' +$' + opt[1] : ''}`;

    cb.onchange = function(){
      if(cb.checked) selected.add(key); else selected.delete(key);
      box.dataset.selected = Array.from(selected).join(',');
      label.classList.toggle('selected', cb.checked);
      updateAddonButton(box);
      updateLineSubtotal(box.closest('.line-card'));
    };

    label.appendChild(cb);
    label.appendChild(span);
    ui.sheet.appendChild(label);
  });

  const actions = document.createElement('div');
  actions.className = 'sheet-actions';
  actions.innerHTML = `<button type="button" class="sheet-done" onclick="finishAddonSheet()">完成</button>`;
  ui.sheet.appendChild(actions);

  ui.mask.classList.add('show');
  ui.sheet.classList.add('show');
}

function updateAddonButton(box){
  const btn = box.querySelector('.addon-multi-btn');
  if(!btn) return;
  const text = getAddonText(box);
  btn.textContent = text || '無';
  calculate();
}


function toggleCart(){document.getElementById("mobileCart").classList.toggle("open");}
enhanceSelects(document);
loadMenuStatus();updateCartBar();


function calculate(){
  document.querySelectorAll(".direct-qty").forEach(el=>{
    const m = el.id && el.id.match(/^direct-(\d+)-(\d+)$/);
    if(!m) return;
    const ci = Number(m[1]);
    const ii = Number(m[2]);
    const cat = categories[ci];
    const item = cat && cat.items ? cat.items[ii] : null;
    const sub = document.getElementById(`direct-sub-${ci}-${ii}`);
    if(sub && item){
      const qty = Math.max(0, Number(el.value || 0));
      sub.textContent = "$" + (qty * Number(item.price || 0));
    }
  });
  updateCartBar();
}

function validateOrder(){
  const phone = document.getElementById("phone")?.value.trim() || "";
  const takeType = document.getElementById("takeType")?.value || "";
  const address = document.getElementById("address")?.value.trim() || "";

  if(!phone){
    alert("請填寫電話。");
    return false;
  }
  if(takeType === "外送" && !address){
    alert("外送請填寫外送地址。");
    return false;
  }
  if(!cartItems.length){
    alert("請先加入訂購內容。");
    return false;
  }
  return true;
}

function toggleAddressRequired(){
  const takeType = document.getElementById("takeType");
  const address = document.getElementById("address");
  const requiredText = document.getElementById("addressRequiredText");
  if(!takeType || !address) return;

  const isDelivery = takeType.value === "外送";
  address.required = isDelivery;
  address.placeholder = isDelivery ? "外送時必填" : "可不填";
  if(requiredText) requiredText.style.display = isDelivery ? "inline" : "none";
}

function applyRemoteMenuStatus(data){
  if(!data || !data.ok) return;

  const list = data.items || data.menu || data.status || [];
  if(Array.isArray(list)){
    list.forEach(row=>{
      const name = normalizeItemName(row.name || row["品項"] || row.item || "");
      if(!name) return;
      categories.forEach(cat=>{
        cat.items.forEach(item=>{
          if(normalizeItemName(item.name) === name){
            const status = String(row.status || row["狀態"] || row["販售狀態"] || "").trim();
            const sold = String(row.soldOut ?? row["售完"] ?? "").trim();
            const hidden = String(row.hidden ?? row["隱藏"] ?? "").trim();
            if(status === "售完" || sold === "TRUE" || sold === "是" || sold === "1") item.soldOut = true;
            if(status === "隱藏" || hidden === "TRUE" || hidden === "是" || hidden === "1") item.hidden = true;
          }
        });
      });
    });
    renderMenu();
    calculate();
  }

  if(data.store) applyDeliverySettingsFromStore(data.store);
}

function queryOrder(){
  const phone = document.getElementById("queryPhone")?.value.trim() || "";
  const result = document.getElementById("queryResult");
  if(!phone){
    alert("請輸入訂購電話。");
    return;
  }
  if(result) result.textContent = "查詢中...";

  const cb = "queryOrderCallback_" + Date.now();
  window[cb] = function(data){
    try{
      if(result){
        if(data && data.ok && data.text){
          result.textContent = data.text;
        }else if(data && data.ok && data.order){
          result.textContent = JSON.stringify(data.order, null, 2);
        }else{
          result.textContent = (data && data.message) ? data.message : "查無訂單。";
        }
      }
    }finally{
      delete window[cb];
      const s = document.getElementById(cb);
      if(s) s.remove();
    }
  };

  const old = document.getElementById(cb);
  if(old) old.remove();
  const script = document.createElement("script");
  script.id = cb;
  script.src = GOOGLE_SCRIPT_URL + "?action=query&phone=" + encodeURIComponent(phone) + "&callback=" + cb + "&t=" + Date.now();
  script.onerror = function(){
    if(result) result.textContent = "查詢失敗，請稍後再試。";
  };
  document.body.appendChild(script);
}


function finishAddonSheet(){
  const mask=document.getElementById('selectSheetMask');
  const sheet=document.getElementById('selectSheet');
  if(mask) mask.classList.remove('show');
  if(sheet) sheet.classList.remove('show');
}
